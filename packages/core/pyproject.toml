[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "salinity-core"
version = "0.1.0"
dependencies = [
    "pyyaml",
    "python-box",
    "ensure",
    "joblib",
    "numpy",
    "pandas",
    "boto3",
    "scikit-learn",
    "torch",
    "onnxruntime-gpu",
    "xgboost",
    "python-dotenv",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["core*"]