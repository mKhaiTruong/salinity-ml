training_params:
  metric_mode: "max"
  model_name: 'lstm'
  sliding_window_size: 6
  sliding_horizon: 1

xgboost:
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8

lstm:
  hidden_size: 64
  num_layers: 2
  dropout: 0.2
  epochs: 50
  batch_size: 8
  learning_rate: 0.001
  patience: 10

iTransformer:
  hidden_size: 64
  epochs: 50
  batch_size: 8
  learning_rate: 0.001
  patience: 10

evaluation_params:
  batch_size: 8